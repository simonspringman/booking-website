<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 60" width="380" height="60">
  <defs>
    <clipPath id="emblemClip"><circle cx="28" cy="30" r="23"/></clipPath>
  </defs>
  <!-- Emblem -->
  <g>
    <!-- Outer dark blue circle -->
    <circle cx="28" cy="30" r="24" fill="#003F87"/>
    <!-- Inner sky blue circle -->
    <circle cx="28" cy="30" r="21" fill="#1B98D4"/>
    <!-- Light blue arc accent on left -->
    <path d="M7,34 C8,42 14,49 24,52 C14,48 9,40 7,34Z" fill="#00A1DE" opacity="0.9"/>
    <!-- Green swoosh/arc -->
    <path d="M4,38 C10,52 28,56 52,44 C46,52 28,56 10,48 C6,46 4,42 4,38Z" fill="#6DB544" clip-path="url(#emblemClip)"/>
    <!-- Sun glow -->
    <circle cx="28" cy="26" r="12" fill="rgba(255,255,200,0.12)"/>
    <!-- Sun body -->
    <circle cx="28" cy="26" r="6" fill="#FDD216"/>
    <circle cx="28" cy="26" r="4" fill="#FEEA00"/>
    <!-- Sun rays - 16 sharp triangular rays -->
    <g fill="#FDD216" clip-path="url(#emblemClip)">
      <!-- N --> <polygon points="28,11 29.2,19 26.8,19"/>
      <!-- NNE --> <polygon points="34,12.5 31,19.5 29.5,18.5"/>
      <!-- NE --> <polygon points="39,16 33,21 31.5,19.5"/>
      <!-- ENE --> <polygon points="42,21 34.5,23.5 34,21.5"/>
      <!-- E --> <polygon points="43,26 35,24.8 35,27.2"/>
      <!-- ESE --> <polygon points="42,31 34.5,28.5 34,30.5"/>
      <!-- SE --> <polygon points="39,36 33,31 31.5,32.5"/>
      <!-- SSE --> <polygon points="34,39.5 31,32.5 29.5,33.5"/>
      <!-- S --> <polygon points="28,41 29.2,33 26.8,33"/>
      <!-- SSW --> <polygon points="22,39.5 25,32.5 26.5,33.5"/>
      <!-- SW --> <polygon points="17,36 23,31 24.5,32.5"/>
      <!-- WSW --> <polygon points="14,31 21.5,28.5 22,30.5"/>
      <!-- W --> <polygon points="13,26 21,24.8 21,27.2"/>
      <!-- WNW --> <polygon points="14,21 21.5,23.5 22,21.5"/>
      <!-- NW --> <polygon points="17,16 23,21 24.5,19.5"/>
      <!-- NNW --> <polygon points="22,12.5 25,19.5 26.5,18.5"/>
    </g>
    <!-- Sun center highlight -->
    <circle cx="27" cy="25" r="2" fill="rgba(255,255,255,0.3)"/>
  </g>
  <!-- RwandAirCARGO text -->
  <text x="60" y="40" font-family="Georgia, 'Times New Roman', serif" font-size="32" font-style="italic" fill="#00529b" letter-spacing="-0.5"><tspan font-weight="600">RwandAir</tspan><tspan font-weight="700">CARGO</tspan></text>
</svg>
